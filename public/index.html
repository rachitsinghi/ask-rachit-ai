<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ask Rachit AI</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fafafa;
        --surface: #ffffff;
        --border: #e4e4e7;
        --text: #18181b;
        --muted: #71717a;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --user-bg: #eff6ff;
        --bot-bg: #f4f4f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      header h1 {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 600;
      }

      header p {
        margin: 0.25rem 0 0;
        font-size: 0.875rem;
        color: var(--muted);
      }

      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        max-width: 42rem;
        width: 100%;
        margin: 0 auto;
      }

      .msg {
        max-width: 90%;
        padding: 0.75rem 1rem;
        border-radius: 1rem;
        line-height: 1.5;
        font-size: 0.9375rem;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg.user {
        align-self: flex-end;
        background: var(--user-bg);
        border-bottom-right-radius: 0.25rem;
      }

      .msg.bot {
        align-self: flex-start;
        background: var(--bot-bg);
        border-bottom-left-radius: 0.25rem;
      }

      .msg.error {
        align-self: stretch;
        background: #fef2f2;
        color: #991b1b;
        font-size: 0.875rem;
      }

      .msg.loading {
        color: var(--muted);
        font-style: italic;
      }

      form {
        display: flex;
        gap: 0.5rem;
        padding: 1rem 1.25rem;
        border-top: 1px solid var(--border);
        background: var(--surface);
        max-width: 42rem;
        width: 100%;
        margin: 0 auto;
      }

      input[type="text"] {
        flex: 1;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        font: inherit;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      button {
        padding: 0.75rem 1.25rem;
        border: none;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
      }

      button:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        padding: 0 1.25rem 1rem;
        max-width: 42rem;
        width: 100%;
        margin: 0 auto;
      }

      .suggestions button {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        font-size: 0.8125rem;
        padding: 0.5rem 0.875rem;
      }

      .suggestions button:hover:not(:disabled) {
        background: var(--bot-bg);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Ask Rachit AI</h1>
      <p>Portfolio assistant — answers from Rachit's public work and background.</p>
    </header>

    <div id="chat" aria-live="polite">
      <div class="msg bot">
        Hi! Ask me about Rachit's education, projects, UX work, or HCDE coursework.
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <button type="button" data-q="Where did Rachit study?">Education</button>
      <button type="button" data-q="What is Twinkle?">Twinkle project</button>
      <button type="button" data-q="Tell me about InTrack">InTrack</button>
      <button type="button" data-q="What UX case studies has Rachit done?">Case studies</button>
    </div>

    <form id="form" autocomplete="off">
      <input
        id="input"
        type="text"
        name="question"
        placeholder="Ask a question…"
        required
        maxlength="500"
      />
      <button type="submit" id="send">Send</button>
    </form>

    <script>
      const chat = document.getElementById("chat");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const send = document.getElementById("send");
      const suggestions = document.getElementById("suggestions");

      function addMessage(text, role) {
        const el = document.createElement("div");
        el.className = `msg ${role}`;
        el.textContent = text;
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
        return el;
      }

      async function ask(question) {
        const q = question.trim();
        if (!q) return;

        addMessage(q, "user");
        input.value = "";
        send.disabled = true;
        const loading = addMessage("Thinking…", "loading bot");

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q }),
          });

          const data = await res.json().catch(() => ({}));
          loading.remove();

          if (!res.ok) {
            addMessage(data.error || "Something went wrong. Please try again.", "error");
            return;
          }

          addMessage(data.answer || "No answer returned.", "bot");
        } catch {
          loading.remove();
          addMessage("Network error. Check your connection and try again.", "error");
        } finally {
          send.disabled = false;
          input.focus();
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        ask(input.value);
      });

      suggestions.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-q]");
        if (!btn || send.disabled) return;
        ask(btn.dataset.q);
      });
    </script>
  </body>
</html>
